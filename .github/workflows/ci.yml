name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ============================================================
  # 后端测试
  # ============================================================
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edu_mvp
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 语法检查
        run: python -m py_compile backend/app_clean.py

      - name: 运行后端测试
        run: python -m pytest tests/backend/ -v --tb=short

  # ============================================================
  # 前端测试 + 构建
  # ============================================================
  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edu_mvp/frontend
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: edu_mvp/frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 语法检查
        run: npx esbuild src/api.js src/pages/Login.jsx --bundle --format=esm --outfile=/dev/null --external:react --external:react-router-dom --loader:.jsx=jsx

      - name: 运行前端测试
        run: npm test -- --watchAll=false

      - name: 构建
        run: npm run build
